[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
filterwarnings = [
    # The background command-executor coroutine is intentionally not awaited
    # when asyncio.create_task is patched out during unit tests.
    "ignore:coroutine 'GiraBleApi._command_executor' was never awaited:RuntimeWarning",
]

[tool.coverage.run]
source = ["custom_components/gira_system_3000"]
omit = ["tests/*"]

[tool.coverage.report]
show_missing = true
