<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <!-- Background -->
  <rect width="400" height="300" rx="12" fill="#f0f4f8"/>

  <!-- Device outline -->
  <rect x="150" y="40" width="100" height="160" rx="10" fill="#ffffff" stroke="#4a90d9" stroke-width="3"/>

  <!-- Bluetooth button -->
  <circle cx="200" cy="170" r="22" fill="#4a90d9"/>
  <!-- Bluetooth symbol -->
  <polyline points="194,158 206,164 200,170 206,176 194,182" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="200" y1="158" x2="200" y2="182" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Cover slats -->
  <line x1="163" y1="65" x2="237" y2="65" stroke="#90b4d6" stroke-width="3" stroke-linecap="round"/>
  <line x1="163" y1="78" x2="237" y2="78" stroke="#90b4d6" stroke-width="3" stroke-linecap="round"/>
  <line x1="163" y1="91" x2="237" y2="91" stroke="#90b4d6" stroke-width="3" stroke-linecap="round"/>
  <line x1="163" y1="104" x2="237" y2="104" stroke="#90b4d6" stroke-width="3" stroke-linecap="round"/>
  <line x1="163" y1="117" x2="237" y2="117" stroke="#90b4d6" stroke-width="3" stroke-linecap="round"/>
  <line x1="163" y1="130" x2="237" y2="130" stroke="#90b4d6" stroke-width="3" stroke-linecap="round"/>
  <line x1="163" y1="143" x2="237" y2="143" stroke="#90b4d6" stroke-width="3" stroke-linecap="round"/>

  <!-- Timer arc around button (4 seconds indicator) -->
  <circle cx="200" cy="170" r="32" fill="none" stroke="#f0a500" stroke-width="3" stroke-dasharray="160 40" stroke-dashoffset="50" stroke-linecap="round"/>

  <!-- Finger press indicator -->
  <ellipse cx="200" cy="215" rx="14" ry="6" fill="#f0a500" opacity="0.4"/>
  <text x="200" y="237" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#666">press &amp; hold</text>

  <!-- 4s label -->
  <text x="240" y="145" text-anchor="start" font-family="sans-serif" font-size="14" font-weight="bold" fill="#f0a500">4 s</text>

  <!-- Heading -->
  <text x="200" y="268" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#333">Enable Coupling Mode</text>
  <text x="200" y="286" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#555">Push the Bluetooth button for 4 seconds</text>
</svg>
